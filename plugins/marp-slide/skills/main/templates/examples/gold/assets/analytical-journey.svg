  <g text-anchor="middle"><circle cx="175" cy="338" r="22" fill="#24685e"/><circle cx="290" cy="338" r="30" fill="#24685e"/><circle cx="405" cy="338" r="22" fill="#a6422c"/><circle cx="520" cy="338" r="22" fill="#a6422c"/><circle cx="635" cy="338" r="22" fill="#a6422c"/>
