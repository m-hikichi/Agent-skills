  <g fill="#fff" stroke="#cbd7e4"><rect x="52" y="84" width="238" height="48" rx="9"/><rect x="52" y="148" width="238" height="48" rx="9"/><rect x="52" y="212" width="238" height="48" rx="9"/><rect x="52" y="276" width="238" height="48" rx="9"/><rect x="52" y="340" width="238" height="48" rx="9"/></g>
  <g font-size="16" fill="#42566e"><text x="76" y="114">1. FAQを検索</text><text x="76" y="178">2. 規約を確認</text><text x="76" y="242">3. 過去回答を検索</text><text x="76" y="306">4. 手順書を確認</text><text x="76" y="370">5. 引用元を控える</text></g>
