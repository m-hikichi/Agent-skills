<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="420" viewBox="0 0 1080 420" role="img" aria-labelledby="title desc">
  <title id="title">90日PoCロードマップ</title><desc id="desc">基準測定、限定運用、評価の3区間と毎週の品質監査</desc>
  <rect width="1080" height="420" rx="18" fill="#fff"/>
  <g font-family="sans-serif"><text x="72" y="50" font-size="18" fill="#58697f">13週間｜対象3分類｜毎週品質監査</text>
  <line x1="92" y1="176" x2="988" y2="176" stroke="#cbd7e4" stroke-width="8"/>
  <rect x="92" y="140" width="138" height="72" rx="12" fill="#9cb5cc"/><rect x="250" y="140" width="554" height="72" rx="12" fill="#174a7e"/><rect x="824" y="140" width="164" height="72" rx="12" fill="#e0782f"/>
  <g text-anchor="middle" fill="#fff" font-size="18" font-weight="700"><text x="161" y="171">基準測定</text><text x="161" y="195">1〜2週</text><text x="527" y="171">限定運用</text><text x="527" y="195">3〜10週</text><text x="906" y="171">評価</text><text x="906" y="195">11〜13週</text></g>
  <g fill="#42566e" font-size="16"><text x="92" y="260">・現状値と測定定義</text><text x="250" y="260">・担当者支援のみ／週次sample監査</text><text x="824" y="260">・3指標のAND判定</text></g>
  <line x1="92" y1="322" x2="988" y2="322" stroke="#e0782f" stroke-width="3" stroke-dasharray="8 7"/>
  <g fill="#e0782f"><circle cx="161" cy="322" r="8"/><circle cx="326" cy="322" r="8"/><circle cx="492" cy="322" r="8"/><circle cx="658" cy="322" r="8"/><circle cx="824" cy="322" r="8"/><circle cx="940" cy="322" r="8"/></g>
  <text x="92" y="365" font-size="17" font-weight="700" fill="#d76520">停止線：重大な誤引用を検知したら一時停止し、原因確認後に再開判断</text></g>
</svg>
