<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="390" viewBox="0 0 1080 390" role="img" aria-labelledby="title desc">
  <title id="title">初週支援の無作為化実験</title><desc id="desc">新規顧客を通常導入と初週ガイドへ無作為に割り付けて比較する</desc>
  <rect width="1080" height="390" rx="18" fill="#fff"/>
  <g font-family="sans-serif"><rect x="70" y="125" width="180" height="112" rx="12" fill="#252522"/><text x="160" y="170" text-anchor="middle" font-size="19" font-weight="700" fill="#fbfaf6">新規顧客</text><text x="160" y="202" text-anchor="middle" font-size="15" fill="#d8d1c6">適格基準を固定</text>
  <path d="M250 181h92" stroke="#24685e" stroke-width="4"/><path d="m332 169 18 12-18 12" fill="#24685e"/><circle cx="390" cy="181" r="46" fill="#e5efec"/><text x="390" y="174" text-anchor="middle" font-size="15" font-weight="700" fill="#24685e">無作為</text><text x="390" y="196" text-anchor="middle" font-size="15" fill="#24685e">割付</text>
  <path d="M429 156 520 100M429 206l91 58" stroke="#24685e" stroke-width="4"/>
  <rect x="532" y="52" width="216" height="100" rx="12" fill="#e5efec"/><text x="640" y="92" text-anchor="middle" font-size="18" font-weight="700" fill="#24685e">初週ガイド</text><text x="640" y="122" text-anchor="middle" font-size="15" fill="#252522">通知 + 15分支援</text>
  <rect x="532" y="218" width="216" height="100" rx="12" fill="#eee9df"/><text x="640" y="258" text-anchor="middle" font-size="18" font-weight="700" fill="#252522">通常導入</text><text x="640" y="288" text-anchor="middle" font-size="15" fill="#6b675f">現行ガイドのみ</text>
  <path d="M748 102h84M748 268h84" stroke="#a6422c" stroke-width="4"/><path d="m822 90 18 12-18 12M822 256l18 12-18 12" fill="#a6422c"/>
  <rect x="852" y="96" width="164" height="178" rx="12" fill="#a6422c"/><text x="934" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">比較</text><text x="934" y="178" text-anchor="middle" font-size="15" fill="#f6ded8">7日設定完了</text><text x="934" y="208" text-anchor="middle" font-size="15" fill="#f6ded8">90日継続</text><text x="934" y="238" text-anchor="middle" font-size="15" fill="#f6ded8">支援工数</text>
  <text x="70" y="352" font-size="14" fill="#6b675f">事前登録：主要評価、sample size、除外基準、解析方針</text></g>
</svg>
