<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="420" viewBox="0 0 1080 420" role="img" aria-labelledby="title desc">
  <title id="title">deploy前後のservice別p95 latency</title><desc id="desc">checkoutだけが220msから4200msへ悪化し他serviceはほぼ不変</desc>
  <rect width="1080" height="420" rx="18" fill="#17233a"/>
  <g font-family="monospace"><text x="62" y="44" font-size="16" fill="#a9b6ca">p95 latency / ms｜10:00 vs 10:10 UTC｜log scale</text>
  <g stroke="#3a4b68"><path d="M250 88v254M830 88v254"/></g><g text-anchor="middle" font-size="17" fill="#edf3fc"><text x="250" y="378">deploy前</text><text x="830" y="378">deploy後</text></g>
  <line x1="250" y1="276" x2="830" y2="105" stroke="#fb7185" stroke-width="6"/><circle cx="250" cy="276" r="10" fill="#fb7185"/><circle cx="830" cy="105" r="10" fill="#fb7185"/><text x="208" y="270" text-anchor="end" font-size="16" fill="#fb7185">checkout 220</text><text x="852" y="110" font-size="16" fill="#fb7185">4,200</text>
  <line x1="250" y1="296" x2="830" y2="291" stroke="#45c7fa" stroke-width="4"/><circle cx="250" cy="296" r="8" fill="#45c7fa"/><circle cx="830" cy="291" r="8" fill="#45c7fa"/><text x="208" y="302" text-anchor="end" font-size="15" fill="#45c7fa">search 175</text><text x="852" y="296" font-size="15" fill="#45c7fa">182</text>
  <line x1="250" y1="286" x2="830" y2="281" stroke="#50dc88" stroke-width="4"/><circle cx="250" cy="286" r="8" fill="#50dc88"/><circle cx="830" cy="281" r="8" fill="#50dc88"/><text x="208" y="290" text-anchor="end" font-size="15" fill="#50dc88">profile 198</text><text x="852" y="286" font-size="15" fill="#50dc88">205</text>
  <rect x="404" y="78" width="270" height="54" rx="27" fill="#382337"/><text x="539" y="111" text-anchor="middle" font-size="17" font-weight="700" fill="#fb7185">checkoutだけ19.1×</text>
  <text x="62" y="405" font-size="13" fill="#a9b6ca">注：広い値域を示すため対数尺度。値ラベルを併記。</text></g>
</svg>
