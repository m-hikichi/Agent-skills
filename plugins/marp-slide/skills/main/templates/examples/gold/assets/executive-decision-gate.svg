<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="430" viewBox="0 0 1080 430" role="img" aria-labelledby="title desc">
  <title id="title">本導入判定ゲート</title><desc id="desc">時間、品質、運用負荷の3条件をすべて満たす場合だけ本導入を検討する</desc>
  <rect width="1080" height="430" rx="18" fill="#fff"/>
  <g font-family="sans-serif"><text x="72" y="50" font-size="18" fill="#58697f">3条件のAND判定｜開始前に閾値を固定</text>
  <g><circle cx="214" cy="190" r="102" fill="#e7eff7"/><circle cx="540" cy="190" r="102" fill="#edf3f8"/><circle cx="866" cy="190" r="102" fill="#f7ede3"/></g>
  <g text-anchor="middle"><text x="214" y="150" font-size="18" fill="#58697f">時間</text><text x="214" y="198" font-size="38" font-weight="800" fill="#174a7e">≤17分</text><text x="214" y="230" font-size="15" fill="#58697f">一次回答中央値</text>
  <text x="540" y="150" font-size="18" fill="#58697f">品質</text><text x="540" y="198" font-size="38" font-weight="800" fill="#174a7e">≤18%</text><text x="540" y="230" font-size="15" fill="#58697f">再問い合わせ率</text>
  <text x="866" y="150" font-size="18" fill="#8b5c32">運用</text><text x="866" y="198" font-size="38" font-weight="800" fill="#d76520">≤2h</text><text x="866" y="230" font-size="15" fill="#8b5c32">週次更新工数</text></g>
  <path d="M316 190h110M642 190h110" stroke="#91a7bd" stroke-width="4"/><text x="370" y="181" font-size="24" fill="#58697f">AND</text><text x="696" y="181" font-size="24" fill="#58697f">AND</text>
  <rect x="330" y="326" width="420" height="62" rx="31" fill="#174a7e"/><text x="540" y="366" text-anchor="middle" font-size="23" font-weight="700" fill="#fff">すべて達成 → 本導入を検討</text></g>
</svg>
