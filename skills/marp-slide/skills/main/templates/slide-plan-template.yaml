# デッキ全体のゴール（1文で書く）
deck_goal: ""

# story_arc は outline.yaml から転記する
story_arc: []

# 各スライドの設計
# archetype は references/layout-patterns.md の承認済み型から選ぶ
# takeaway はトピック名ではなく、聞き手が持ち帰る結論を断定的に書く
slides:
  - slide_no: 1
    section: opening
    role: title
    takeaway: ""
    archetype: title-hero
    key_visual: ""
    max_text_lines: 3
    max_bullets: 0
    required_elements: []

